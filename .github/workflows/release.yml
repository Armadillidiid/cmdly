name: Release
on:
  push:
    branches:
      - main
    tags:
      - "*"
concurrency: ${{ github.workflow }}-${{ github.ref }}
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  version:
    name: Version
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Tag Release
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset-version
          publish: pnpm changeset-publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  binaries:
    name: Binary ${{ matrix.target }}
    if: github.ref_type == 'tag'
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runs_on: ubuntu-latest
            checksum_cmd: sha256sum
          - target: linux-arm64
            runs_on: ubuntu-24.04-arm
            checksum_cmd: sha256sum
          - target: darwin-arm64
            runs_on: macos-latest
            checksum_cmd: shasum -a 256
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Build binary
        run: pnpm build:sea

      - name: Archive binary
        run: |
          mkdir -p release
          cp "dist/${{ matrix.target }}/cmdly" "release/cmdly-${{ matrix.target }}"
          tar -C release -czf "release/cmdly-${{ matrix.target }}.tar.gz" "cmdly-${{ matrix.target }}"
          ${{ matrix.checksum_cmd }} "release/cmdly-${{ matrix.target }}.tar.gz" > "release/cmdly-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes || true
          gh release upload "${GITHUB_REF_NAME}" "release/cmdly-${{ matrix.target }}.tar.gz" "release/cmdly-${{ matrix.target }}.tar.gz.sha256" --clobber
