name: Release
on:
  push:
    branches:
      - main
    tags:
      - "*"
concurrency: ${{ github.workflow }}-${{ github.ref }}
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  version:
    name: Version
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Tag Release
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset-version
          publish: pnpm changeset-publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  binaries-linux:
    name: Binary linux-x64
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Build linux-x64 binary
        run: pnpm build:sea:linux-x64

      - name: Archive linux-x64
        run: |
          mkdir -p release
          cp dist/linux-x64/cmdly release/cmdly-linux-x64
          tar -C release -czf release/cmdly-linux-x64.tar.gz cmdly-linux-x64
          sha256sum release/cmdly-linux-x64.tar.gz > release/cmdly-linux-x64.tar.gz.sha256

      - name: Upload linux-x64 assets
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes || true
          gh release upload "${GITHUB_REF_NAME}" release/cmdly-linux-x64.tar.gz release/cmdly-linux-x64.tar.gz.sha256 --clobber

  binaries-darwin-arm64:
    name: Binary darwin-arm64
    if: github.ref_type == 'tag'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Build darwin-arm64 binary
        run: pnpm build:sea:darwin-arm64

      - name: Archive darwin-arm64
        run: |
          mkdir -p release
          cp dist/darwin-arm64/cmdly release/cmdly-darwin-arm64
          tar -C release -czf release/cmdly-darwin-arm64.tar.gz cmdly-darwin-arm64
          shasum -a 256 release/cmdly-darwin-arm64.tar.gz > release/cmdly-darwin-arm64.tar.gz.sha256

      - name: Upload darwin-arm64 assets
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes || true
          gh release upload "${GITHUB_REF_NAME}" release/cmdly-darwin-arm64.tar.gz release/cmdly-darwin-arm64.tar.gz.sha256 --clobber
